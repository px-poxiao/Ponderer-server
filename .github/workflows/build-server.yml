name: Build Server

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/build-server.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/build-server.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-server:
    name: Build server plugin
    runs-on: ubuntu-latest
    env:
      MC_SSH_HOST: ${{ secrets.MC_SSH_HOST }}
      MC_SSH_USER: ${{ secrets.MC_SSH_USER }}
      MC_SSH_PORT: ${{ secrets.MC_SSH_PORT }}
      MC_SSH_KEY: ${{ secrets.MC_SSH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Build server plugin
        shell: bash
        run: |
          for attempt in 1 2 3; do
            gradle -p server clean build --no-daemon && break
            if [ "$attempt" = "3" ]; then exit 1; fi
            sleep $((attempt * 20))
          done

      - name: Prepare server artifact
        shell: bash
        run: |
          mkdir -p dist
          cp server/build/libs/ponderer_server-1.0.jar dist/ponderer_server_1.0.jar

      - name: Upload server plugin
        uses: actions/upload-artifact@v4
        with:
          name: ponderer_server_1.0
          path: dist/ponderer_server_1.0.jar
          if-no-files-found: error
          retention-days: 14

      - name: Deploy server plugin to Debian
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploy event: ${{ github.event_name }}"
          echo "Deploy ref: ${{ github.ref }}"

          missing=0
          if [ -z "${MC_SSH_HOST:-}" ]; then echo "Missing secret: MC_SSH_HOST"; missing=1; fi
          if [ -z "${MC_SSH_USER:-}" ]; then echo "Missing secret: MC_SSH_USER"; missing=1; fi
          if [ -z "${MC_SSH_KEY:-}" ]; then echo "Missing secret: MC_SSH_KEY"; missing=1; fi
          if [ "$missing" = "1" ]; then exit 1; fi

          port="${MC_SSH_PORT:-22}"

          mkdir -p ~/.ssh
          printf '%s\n' "$MC_SSH_KEY" > ~/.ssh/ponderer_deploy_key
          chmod 600 ~/.ssh/ponderer_deploy_key
          ssh-keyscan -p "$port" "$MC_SSH_HOST" >> ~/.ssh/known_hosts

          scp -P "$port" -i ~/.ssh/ponderer_deploy_key \
            dist/ponderer_server_1.0.jar \
            "${MC_SSH_USER}@${MC_SSH_HOST}:/tmp/ponderer_server.jar"

          ssh -p "$port" -i ~/.ssh/ponderer_deploy_key \
            "${MC_SSH_USER}@${MC_SSH_HOST}" \
            "sudo /usr/local/bin/deploy-ponderer-server /tmp/ponderer_server.jar"
