name: Build Client Fabric

on:
  push:
    paths:
      - "client/common/**"
      - "client/fabric/**"
      - "client/libs/**"
      - "client/build.gradle"
      - "client/settings.gradle"
      - "client/gradle.properties"
      - ".github/workflows/build-client-fabric.yml"
  pull_request:
    paths:
      - "client/common/**"
      - "client/fabric/**"
      - "client/libs/**"
      - "client/build.gradle"
      - "client/settings.gradle"
      - "client/gradle.properties"
      - ".github/workflows/build-client-fabric.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-client-fabric:
    name: Build Fabric client mod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Build Fabric standalone client addon
        shell: bash
        run: |
          for attempt in 1 2 3; do
            gradle -p client clean :fabric:build --no-daemon && break
            if [ "$attempt" = "3" ]; then exit 1; fi
            sleep $((attempt * 20))
          done

      - name: Prepare Fabric standalone artifact
        shell: bash
        run: |
          mkdir -p dist
          cp client/fabric/build/libs/ponderer-client-addon-1.0.jar dist/ponderer_client_addon_1.0_mc1.21.1_fabric.jar

      - name: Install Ponderer Fabric into local Maven
        shell: bash
        run: |
          set -euo pipefail
          version="1.9.0.6"
          artifact_dir="client/local-maven/com/nododiiiii/ponderer-fabric/${version}"
          mkdir -p "${artifact_dir}"
          jarfile="client/libs/ponderer-1.21.1-fabric-${version}.jar"
          test -f "${jarfile}"
          cp "${jarfile}" "${artifact_dir}/ponderer-fabric-${version}.jar"
          cat > "${artifact_dir}/ponderer-fabric-${version}.pom" <<POM
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.nododiiiii</groupId>
            <artifactId>ponderer-fabric</artifactId>
            <version>${version}</version>
            <packaging>jar</packaging>
          </project>
          POM

      - name: Build Fabric all-in-one client mod
        shell: bash
        run: |
          for attempt in 1 2 3; do
            gradle -p client clean :fabric:build -PbundlePondererFabric=true --no-daemon && break
            if [ "$attempt" = "3" ]; then exit 1; fi
            sleep $((attempt * 20))
          done

      - name: Prepare Fabric all-in-one artifact
        shell: bash
        run: |
          cp client/fabric/build/libs/ponderer-client-addon-1.0.jar dist/ponderer_client_all_in_one_1.0_mc1.21.1_fabric.jar

      - name: Upload Fabric standalone client addon
        uses: actions/upload-artifact@v4
        with:
          name: ponderer_client_addon_1.0_mc1.21.1_fabric
          path: dist/ponderer_client_addon_1.0_mc1.21.1_fabric.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload Fabric all-in-one client mod
        uses: actions/upload-artifact@v4
        with:
          name: ponderer_client_all_in_one_1.0_mc1.21.1_fabric
          path: dist/ponderer_client_all_in_one_1.0_mc1.21.1_fabric.jar
          if-no-files-found: error
          retention-days: 14
