name: CodeQL

on:
  push:
    branches: [ main, master, "1.21.1" ]
    paths:
      - "server/**"
      - "client/**"
      - ".github/workflows/**"
  pull_request:
    branches: [ main, master, "1.21.1" ]
    paths:
      - "server/**"
      - "client/**"
      - ".github/workflows/**"
  schedule:
    - cron: "24 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze-actions:
    name: Analyze GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"

  analyze-java-kotlin:
    name: Analyze Java and Kotlin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build server plugin
        shell: bash
        run: gradle -p server clean build --no-daemon

      - name: Build Fabric client addon
        shell: bash
        run: gradle -p client clean :fabric:build --no-daemon

      - name: Build NeoForge client addon
        shell: bash
        run: gradle -p client :neoforge:build --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
