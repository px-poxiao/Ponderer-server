name: Build Client NeoForge

on:
  push:
    paths:
      - "client/common/**"
      - "client/neoforge/**"
      - "client/build.gradle"
      - "client/settings.gradle"
      - "client/gradle.properties"
      - ".github/workflows/build-client-neoforge.yml"
  pull_request:
    paths:
      - "client/common/**"
      - "client/neoforge/**"
      - "client/build.gradle"
      - "client/settings.gradle"
      - "client/gradle.properties"
      - ".github/workflows/build-client-neoforge.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-client-neoforge:
    name: Build NeoForge client mod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Build NeoForge standalone client addon
        run: gradle -p client clean :neoforge:build --no-daemon

      - name: Prepare NeoForge standalone artifact
        shell: bash
        run: |
          mkdir -p dist
          cp client/neoforge/build/libs/ponderer-client-addon-1.0.jar dist/ponderer_client_addon_1.0_mc1.21.1_neoforge.jar

      - name: Checkout Ponderer
        uses: actions/checkout@v4
        with:
          repository: Nobodiiiii/Ponderer
          ref: 1.21.1
          path: _deps/ponderer

      - name: Build Ponderer NeoForge
        run: gradle -p _deps/ponderer :NeoForge:build --no-daemon

      - name: Install Ponderer NeoForge into local Maven
        shell: bash
        run: |
          set -euo pipefail
          version="1.7.1.5"
          artifact_dir="client/local-maven/com/nododiiiii/ponderer-neoforge/${version}"
          mkdir -p "${artifact_dir}"
          jarfile="$(find _deps/ponderer/NeoForge/build/libs -maxdepth 1 -name 'ponderer-1.21.1-neoforge-*.jar' ! -name '*sources*' | head -n 1)"
          test -n "${jarfile}"
          cp "${jarfile}" "${artifact_dir}/ponderer-neoforge-${version}.jar"
          cat > "${artifact_dir}/ponderer-neoforge-${version}.pom" <<POM
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.nododiiiii</groupId>
            <artifactId>ponderer-neoforge</artifactId>
            <version>${version}</version>
            <packaging>jar</packaging>
          </project>
          POM

      - name: Build NeoForge all-in-one client mod
        run: gradle -p client clean :neoforge:build -PbundlePonderer=true --no-daemon

      - name: Prepare NeoForge all-in-one artifact
        shell: bash
        run: |
          cp client/neoforge/build/libs/ponderer-client-addon-1.0.jar dist/ponderer_client_all_in_one_1.0_mc1.21.1_neoforge.jar

      - name: Upload NeoForge standalone client addon
        uses: actions/upload-artifact@v4
        with:
          name: ponderer_client_addon_1.0_mc1.21.1_neoforge
          path: dist/ponderer_client_addon_1.0_mc1.21.1_neoforge.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload NeoForge all-in-one client mod
        uses: actions/upload-artifact@v4
        with:
          name: ponderer_client_all_in_one_1.0_mc1.21.1_neoforge
          path: dist/ponderer_client_all_in_one_1.0_mc1.21.1_neoforge.jar
          if-no-files-found: error
          retention-days: 14
