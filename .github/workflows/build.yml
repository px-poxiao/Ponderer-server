name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build server and client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Build server plugin
        run: gradle -p server clean build --no-daemon

      - name: Build client mods
        run: gradle -p client clean :fabric:build :neoforge:build --no-daemon

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp server/build/libs/ponderer_server-1.0.jar dist/ponderer_server_1.0.jar
          cp client/fabric/build/libs/ponderer-client-addon-1.0.jar dist/ponderer_client_addon_1.0_mc1.21.1_fabric.jar
          cp client/neoforge/build/libs/ponderer-client-addon-1.0.jar dist/ponderer_client_addon_1.0_mc1.21.1_neoforge.jar

      - name: Upload server plugin
        uses: actions/upload-artifact@v4
        with:
          name: ponderer_server_1.0
          path: dist/ponderer_server_1.0.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload Fabric client mod
        uses: actions/upload-artifact@v4
        with:
          name: ponderer_client_addon_1.0_mc1.21.1_fabric
          path: dist/ponderer_client_addon_1.0_mc1.21.1_fabric.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload NeoForge client mod
        uses: actions/upload-artifact@v4
        with:
          name: ponderer_client_addon_1.0_mc1.21.1_neoforge
          path: dist/ponderer_client_addon_1.0_mc1.21.1_neoforge.jar
          if-no-files-found: error
          retention-days: 14
