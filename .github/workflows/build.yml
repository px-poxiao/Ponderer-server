name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build server and client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Build server plugin
        run: gradle -p server clean build --no-daemon

      - name: Build client mod
        run: gradle -p client clean build --no-daemon

      - name: Upload server plugin
        uses: actions/upload-artifact@v4
        with:
          name: ponderer-server-plugin
          path: server/build/libs/*.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload client mod
        uses: actions/upload-artifact@v4
        with:
          name: ponderer-client-mod
          path: client/build/libs/*.jar
          if-no-files-found: error
          retention-days: 14
