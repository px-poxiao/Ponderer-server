name: PondererServer
version: '1.0'
main: com.ponderer.server.PondererPlugin
api-version: '1.21'
description: Ponderer 的服务端同步、上传、审核和管理插件
authors: [ PondererServer ]
softdepend: [ LuckPerms ]

commands:
  ponderer-admin:
    description: Ponderer 管理命令
    usage: /ponderer-admin <子命令>
    permission: ponderer.admin
  ponderer:
    description: Ponderer 客户端命令（pull、push、new、list 等）
    usage: /ponderer <子命令>

permissions:
  ponderer.pull:
    description: 允许从服务器拉取思索场景
    default: true
  ponderer.upload:
    description: 允许向服务器上传思索场景
    default: op
  ponderer.admin:
    description: 允许管理 Ponderer 权限和设置
    default: op
  ponderer.create.region:
    description: 允许创建区域或坐标触发型思索场景
    default: op
  ponderer.blueprint:
    description: 允许使用蓝图工具
    default: op
  ponderer.pack.import:
    description: 允许导入思索场景包
    default: op
  ponderer.pack.export:
    description: 允许导出思索场景包
    default: op
  ponderer.ai.use_server_api:
    description: 允许使用服务器提供的 AI API
    default: op
  ponderer.admin.topup:
    description: 允许为玩家充值服务器 AI API token
    default: op
  ponderer.report:
    description: 允许举报思索场景
    default: true
  ponderer.lock:
    description: 允许锁定或解锁自己的思索场景
    default: op
  ponderer.admin.review:
    description: 允许批准或拒绝审核队列中的思索场景
    default: op
  ponderer.admin.groups:
    description: 允许管理可见性分组
    default: op
  ponderer.admin.collab:
    description: 允许管理思索场景协作者
    default: op
  ponderer.admin.reports:
    description: 允许管理思索场景举报
    default: op
