name: PondererServer
version: '1.0'
main: com.ponderer.server.PondererPlugin
api-version: '1.21'
description: Server-side plugin for the Ponderer mod
authors: [ PondererServer ]
depend: [ LuckPerms ]

commands:
  ponderer-admin:
    description: Ponderer admin management commands
    usage: /ponderer-admin <subcommand>
    permission: ponderer.admin
  ponderer:
    description: Ponderer client commands (pull, push, new, list, etc.)
    usage: /ponderer <subcommand>

permissions:
  ponderer.pull:
    description: Can pull scenes from the server
    default: true
  ponderer.upload:
    description: Can upload scenes to the server
    default: op
  ponderer.admin:
    description: Can manage Ponderer permissions and settings
    default: op
  ponderer.create.region:
    description: Can create region/coordinate-triggered scenes
    default: op
  ponderer.blueprint:
    description: Can use the blueprint tool
    default: op
  ponderer.pack.import:
    description: Can import scene packs
    default: op
  ponderer.pack.export:
    description: Can export scene packs
    default: op
  ponderer.ai.use_server_api:
    description: Can use the server-provided AI API
    default: false
  ponderer.admin.topup:
    description: Can top up a player's server AI API token balance
    default: op
  ponderer.report:
    description: Can report scenes
    default: true
  ponderer.lock:
    description: Can lock/unlock own scenes
    default: op
  ponderer.admin.review:
    description: Can approve/reject scenes in review queue
    default: op
  ponderer.admin.groups:
    description: Can manage visibility groups
    default: op
  ponderer.admin.collab:
    description: Can manage scene collaborators
    default: op
  ponderer.admin.reports:
    description: Can manage scene reports
    default: op
